<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Market Skills Dashboard</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/style.css' %}" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">&#128188;</span>
        <span class="logo-text">JobMarket<strong>Dashboard</strong></span>
      </div>
      <p class="tagline">Discover what skills employers are looking for — right now.</p>
    </div>
  </header>

  <!-- SEARCH SECTION -->
  <section class="search-section">
    <div class="container">
      <div class="search-card">
        <h2 class="search-title">Search Jobs</h2>
        <div class="search-row">
          <input
            type="text"
            id="queryInput"
            class="input"
            placeholder="Job title or keyword (e.g. Python Developer)"
          />
          <select id="countrySelect" class="select"></select>
          <button id="searchBtn" class="btn btn-primary">Search</button>
        </div>

        <!-- FILTERS -->
        <div class="filters-row">
          <div class="filter-group">
            <label class="filter-label">Min Salary</label>
            <input type="number" id="salaryMin" class="input input-sm" placeholder="e.g. 30000" />
          </div>
          <div class="filter-group">
            <label class="filter-label">Max Salary</label>
            <input type="number" id="salaryMax" class="input input-sm" placeholder="e.g. 80000" />
          </div>
          <div class="filter-group">
            <label class="filter-label">Sort By</label>
            <select id="sortBy" class="select select-sm">
              <option value="relevance">Relevance</option>
              <option value="date">Date</option>
              <option value="salary">Salary</option>
            </select>
          </div>
          <div class="filter-group filter-check">
            <label class="checkbox-label">
              <input type="checkbox" id="fullTimeOnly" />
              Full-time only
            </label>
          </div>
          <div class="filter-group">
            <label class="filter-label">Results</label>
            <select id="resultsPerPage" class="select select-sm">
              <option value="10">10</option>
              <option value="20" selected>20</option>
              <option value="50">50</option>
            </select>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- ERROR BANNER -->
  <div class="container">
    <div id="errorBanner" class="error-banner hidden"></div>
  </div>

  <!-- STATS BAR -->
  <div class="container" id="statsBar" style="display:none;">
    <div class="stats-bar">
      <span id="totalResults">0 jobs found</span>
      <span id="searchSummary"></span>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <main class="container main-grid" id="mainContent" style="display:none;">

    <!-- LEFT: JOB RESULTS -->
    <section class="results-section">
      <div class="section-header">
        <h3>Job Listings</h3>
      </div>
      <div id="jobList" class="job-list"></div>
      <div id="pagination" class="pagination"></div>
    </section>

    <!-- RIGHT: SKILLS CHART -->
    <aside class="skills-section">
      <div class="section-header">
        <h3>Top Skills in Demand</h3>
        <span id="skillsJobCount" class="badge"></span>
      </div>
      <div class="chart-wrapper">
        <canvas id="skillsChart"></canvas>
      </div>
      <p id="noSkills" class="no-skills hidden">No skill data found for this search.</p>
    </aside>

  </main>

  <!-- JOB DETAIL MODAL -->
  <div id="jobModal" class="modal-overlay hidden">
    <div class="modal">
      <button class="modal-close" id="modalClose">&times;</button>
      <div id="modalContent"></div>
    </div>
  </div>

  <!-- LOADING OVERLAY -->
  <div id="loadingOverlay" class="loading-overlay hidden">
    <div class="spinner"></div>
    <p>Fetching jobs...</p>
  </div>

  {% load static %}
  <script src="{% static 'js/main.js' %}"></script>
</body>
</html>
